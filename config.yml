# config.yml - Application Configuration
# Copy this file to config.yml and customize for your environment.
#
# Structure: environment sections are deep-merged into default.
# Only override what differs per environment.
#
# Dynamic variables:
#   {{ env.VARIABLE_NAME }} - Required env var (throws if missing)
#
# Secrets (JWT_SECRET, API keys, S3 credentials) stay in .env files.
# Only reference them here via {{ env.VAR }} syntax.

default:
  app:
    name: "Groot"
    isProduction: false
    port: 3000

  cors:
    origins:
      - "http://localhost:3000"

  auth:
    jwtExpiresIn: "30d"

  jobs:
    enabled: true
    concurrency: 5
    pollIntervalSeconds: 5
    archiveCompletedAfterSeconds: 604800
    deleteArchivedAfterSeconds: 2592000
    monitorStateIntervalSeconds: 60

  ai:
    defaultProvider: "anthropic"
    defaultModel: "claude-sonnet-4-6"
    enableStreaming: true
    trackUsage: true

  logging:
    level: "info"
    format: "json"

  passkey:
    rpName: "Groot"
    rpId: "localhost"
    origin: "https://groot.localhost"

  sentry:
    dsn: ""

  features:
    enableNotifications: false

development:
  logging:
    level: "debug"
    format: "text"

production:
  app:
    isProduction: true
  jobs:
    concurrency: 10
  logging:
    level: "warn"

test:
  logging:
    level: "silent"
  jobs:
    enabled: false
