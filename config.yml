# config.yml - Application Configuration
# Copy this file to config.yml and customize for your environment.
#
# Structure: environment sections are deep-merged into default.
# Only override what differs per environment.
#
# Dynamic variables:
#   {{ env.VARIABLE_NAME }} - Required env var (throws if missing)
#
# Secrets (JWT_SECRET_KEY, API keys, S3 credentials) stay in .env files.
# Only reference them here via {{ env.VAR }} syntax.

default:
  app:
    name: "Groot"
    isProduction: false
    port: 3000

  cors:
    origins:
      - "http://localhost:3000"

  auth:
    jwtExpiresIn: "30d"

  jobs:
    enabled: true
    concurrency: 5
    pollIntervalSeconds: 5
    archiveCompletedAfterSeconds: 604800
    deleteArchivedAfterSeconds: 2592000
    monitorStateIntervalSeconds: 60

  logging:
    level: "info"
    format: "json"

  passkey:
    rpName: "Groot"
    rpId: "localhost"
    origin: "https://groot.localhost"

  sentry:
    # TODO: Update your sentry DNS
    dsn: "https://52e040a585453b926b90c3cff35506d3@o223853.ingest.us.sentry.io/4511466064773120"

development:
  logging:
    level: "debug"
    format: "text"

production:
  app:
    isProduction: true
  jobs:
    concurrency: 10
  logging:
    level: "warn"

test:
  logging:
    level: "silent"
  jobs:
    enabled: false
