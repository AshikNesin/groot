name: Groot Sync

on:
  schedule:
    - cron: "30 6 * * *" # 12PM IST (6:30 AM UTC)
    - cron: "30 18 * * *" # 12AM IST (6:30 PM UTC)
  workflow_dispatch: # Manual on-demand trigger

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  groot-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run OpenCode Sync
        uses: anomalyco/opencode/github@latest
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: zai/glm-4.7
          use_github_token: true
          prompt: |
            Run the /groot-sync skill to sync reusable core components from the groot boilerplate repository.

            The skill contains all the rules for what to sync (UI components, server core, middlewares, utilities, docs) and what to skip (services, controllers, pages, app-specific code).

            Follow the sync process:
            1. Run `./.groot/sync.sh` to check for available changes
            2. If changes exist, apply them following the skill's decision framework
            3. Update `.groot/boilerplate-sync.json` with the new commit hash

            Branch & PR:
            - Branch name: `chore/groot-sync`
            - If no open PR exists for this branch: create a new PR against main
            - If an open PR already exists: push to the same branch (PR updates automatically)
            - If no changes needed: exit successfully without creating PR

            The boilerplate repo is: https://github.com/AshikNesin/groot
